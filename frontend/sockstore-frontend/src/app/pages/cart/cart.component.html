<div class="min-h-screen bg-gray-100 p-10">

    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-3xl mx-auto">
  
      <h1 class="text-4xl font-bold mb-8">
        🛒 Carrito
      </h1>
  
      <div
        *ngFor="let item of cartItems"
        class="border-b py-6 flex justify-between items-center"
      >
  
        <div>
  
          <h2 class="text-2xl font-bold">
            {{ item.product.name }}
          </h2>
  
          <p class="text-gray-500">
            ₡ {{ item.product.price }}
          </p>
  
        </div>
  
        <div class="flex items-center gap-4">
  
          <button
            (click)="remove(item)"
            class="bg-red-500 text-white px-4 py-2 rounded-lg"
          >
            -
          </button>
  
          <span class="text-xl font-bold">
            {{ item.quantity }}
          </span>
  
          <button
            (click)="add(item)"
            class="bg-green-500 text-white px-4 py-2 rounded-lg"
          >
            +
          </button>
  
        </div>
  
      </div>
  
      <h2 class="text-3xl font-bold mt-10">
        Total: ₡ {{ getTotal() }}
      </h2>
      <button
        routerLink="/checkout"
        [disabled]="!hasItems()"
        class="bg-green-600 text-white px-6 py-3 rounded-xl mt-6
              hover:bg-green-700
              disabled:bg-gray-400
              disabled:cursor-not-allowed"
      >
        ✅ Proceder al Checkout
      </button>
  
    </div>
  
  </div>
