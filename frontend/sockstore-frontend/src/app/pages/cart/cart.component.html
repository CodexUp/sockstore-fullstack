<div class="min-h-screen bg-gray-100 p-4 md:p-10">

    <div class="bg-white rounded-2xl shadow-xl p-4 md:p-8 max-w-3xl mx-auto">
  
      <h1 class="text-4xl font-bold mb-8">
        🛒 Carrito
      </h1>
  
      <div
        *ngFor="let item of cartItems"
        class="border-b py-6 flex flex-col md:flex-row justify-between items-center gap-4"
      >

        <div class="flex flex-col sm:flex-row items-center gap-4 w-full">

          <img
            [src]="item.product.imageUrl"
            [alt]="item.product.name"
            class="w-24 h-24 object-cover rounded-xl border"
          >

          <div>

            <h2 class="text-2xl font-bold">
              {{ item.product.name }}
            </h2>

            <p class="text-gray-500">
              ₡ {{ item.product.price }}
            </p>

            <p class="text-sm text-gray-400">
              Subtotal: ₡ {{ item.product.price * item.quantity }}
            </p>

          </div>

        </div>

        <div class="flex items-center gap-4 justify-between">

          <button
            (click)="remove(item)"
            class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600"
          >
            -
          </button>

          <span class="text-xl font-bold">
            {{ item.quantity }}
          </span>

          <button
            (click)="add(item)"
            class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600"
          >
            +
          </button>

        </div>

      </div>
  
      <h2 class="text-3xl font-bold mt-10">
        Total: ₡ {{ getTotal() }}
      </h2>
      <button
        routerLink="/checkout"
        [disabled]="!hasItems()"
        class="bg-green-600 text-white w-full md:w-auto px-6 py-3 rounded-xl mt-6
              hover:bg-green-700
              disabled:bg-gray-400
              disabled:cursor-not-allowed"
      >
        ✅ Proceder al Checkout
      </button>
  
    </div>
  
  </div>
