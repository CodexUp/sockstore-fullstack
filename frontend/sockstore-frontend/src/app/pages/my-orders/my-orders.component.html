<div
  class="min-h-screen bg-gray-100 p-10"
>

  <h1
    class="text-4xl font-bold mb-8"
  >
    📦 Mis Compras
  </h1>

  <div
    *ngFor="let order of orders"
    class="bg-white p-6 rounded-xl shadow mb-6"
  >

    <div class="flex justify-between">

      <h2 class="font-bold text-xl">
        Orden #{{ order.id }}
      </h2>

      <span
        class="font-bold text-green-600"
      >
        {{ order.status }}
      </span>

    </div>

    <p class="mt-2">
      Fecha:
      {{ order.createdAt | date }}
    </p>

    <p class="mb-4">
      Total:
      ₡ {{ order.total }}
    </p>

    <div
      *ngFor="
        let item of order.items
      "
      class="border-t py-2"
    >

      🧦
      {{ item.product.name }}

      x{{ item.quantity }}

    </div>

  </div>

</div>
