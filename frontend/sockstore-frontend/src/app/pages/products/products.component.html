<div class="min-h-screen bg-gray-100 py-10">

    <div class="flex flex-wrap justify-center gap-8 px-6">
  
      <div
        *ngFor="let product of products"
        class="bg-white rounded-2xl shadow-lg w-72 overflow-hidden hover:scale-105 transition duration-300"
      >
  
        <img
          [src]="product.imageUrl"
          alt=""
          class="w-full h-72 object-cover"
        >
  
        <div class="p-5">
  
          <h2 class="text-2xl font-bold mb-2">
            {{ product.name }}
          </h2>
  
          <p class="text-gray-600 mb-4">
            {{ product.description }}
          </p>
  
          <h3 class="text-3xl font-bold text-green-600 mb-4">
            ₡ {{ product.price }}
          </h3>
  
          <button
            (click)="addToCart(product)"
            class="bg-black text-white w-full py-3 rounded-xl hover:bg-gray-800 transition"
          >
            Agregar al carrito
          </button>
  
        </div>
  
      </div>
  
    </div>
  
  </div>
