<div
  class="min-h-screen flex items-center justify-center bg-gray-100"
>

  <div
    class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md"
  >

    <h1
      class="text-4xl font-bold mb-8 text-center"
    >
      📝 Registro
    </h1>

    <input
      type="email"
      [(ngModel)]="email"
      placeholder="Correo"
      class="w-full border p-3 rounded-lg mb-4"
    >

    <input
      type="password"
      [(ngModel)]="password"
      placeholder="Contraseña"
      class="w-full border p-3 rounded-lg mb-6"
    >

    <button
      (click)="register()"
      class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700"
    >
      Registrarse
    </button>

  </div>

</div>
