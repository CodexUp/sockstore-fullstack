<div class="p-8 max-w-3xl mx-auto">

    <h1 class="text-4xl font-bold mb-8">
      🧾 Checkout
    </h1>
  
    <div class="bg-white shadow-lg rounded-2xl p-8 flex flex-col gap-5">
  
      <input
        [(ngModel)]="customerName"
        placeholder="Nombre completo"
        class="border p-4 rounded-xl"
      >
  
      <input
        [(ngModel)]="address"
        placeholder="Dirección"
        class="border p-4 rounded-xl"
      >
  
      <input
        [(ngModel)]="phone"
        placeholder="Teléfono"
        class="border p-4 rounded-xl"
      >
  
      <button
        (click)="finishOrder()"
        class="bg-black text-white p-4 rounded-xl hover:bg-gray-800"
      >
        💳 Finalizar Compra
      </button>
  
    </div>
  
  </div>
