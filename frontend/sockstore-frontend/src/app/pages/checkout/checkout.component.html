<div class="p-8 md:p-8 w-full max-w-2xl mx-auto">

    <h1 class="text-4xl font-bold mb-8">
      🧾 Checkout
    </h1>
  
    <div class="bg-white shadow-lg rounded-2xl p-4 md:p-8 flex flex-col gap-5">
  
      <input
        [(ngModel)]="customerName"
        placeholder="Nombre completo"
        class="border p-4 rounded-xl"
      >
  
      <input
        [(ngModel)]="address"
        placeholder="Dirección"
        class="border p-4 rounded-xl"
      >
  
      <input
        [(ngModel)]="phone"
        placeholder="Teléfono"
        class="border p-4 rounded-xl"
      >

      <div class="text-2xl font-bold text-green-600">
        Total: ₡ {{ cartService.getTotal() }}
      </div>
  
      <button
        (click)="finishOrder()"
        class="bg-black text-white p-4 rounded-xl hover:bg-gray-800 w-full"
      >
        💳 Finalizar Compra
      </button>
  
    </div>
  
  </div>
