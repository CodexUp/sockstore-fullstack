<div
  *ngIf="user"
  class="min-h-screen bg-gray-100 p-10"
>

  <div
    class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8"
  >

    <h1
      class="text-4xl font-bold mb-8"
    >
      👤 Mi Perfil
    </h1>

    <div class="mb-4">

      <label class="font-semibold">
        Nombre
      </label>

      <input
        [(ngModel)]="user.name"
        class="w-full border p-3 rounded-lg mt-2"
      />

    </div>

    <div class="mb-4">

      <label class="font-semibold">
        Email
      </label>

      <input
        [value]="user.email"
        disabled
        class="w-full border p-3 rounded-lg mt-2 bg-gray-100"
      />

    </div>

    <div class="mb-4">

      <label class="font-semibold">
        Teléfono
      </label>

      <input
        [(ngModel)]="user.phone"
        class="w-full border p-3 rounded-lg mt-2"
      />

    </div>

    <div class="mb-6">

      <label class="font-semibold">
        Dirección
      </label>

      <textarea
        [(ngModel)]="user.address"
        class="w-full border p-3 rounded-lg mt-2"
      ></textarea>

    </div>

    <button
      (click)="saveProfile()"
      class="bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700"
    >
      💾 Guardar Cambios
    </button>

  </div>

</div>
